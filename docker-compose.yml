version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cortex-mq:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - REDIS_URL=redis://redis:6379
      - GRPC_PORT=50051
      - VIRTUAL_NODES=150
      - HEARTBEAT_INTERVAL=10
      - MISSED_HEARTBEAT_THRESHOLD=3
      - MAX_MSG_MB=4
      - LOG_FORMAT=pretty
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  cortex-swarm:
    build:
      context: ./cortex-swarm
      dockerfile: Dockerfile
    env_file:
      - ./cortex-swarm/.env
    environment:
      - BROKER_URL=cortex-mq:50051
      - MAX_CONCURRENT=5
      - HEARTBEAT_INTERVAL_SECS=5
      - CLAIM_INTERVAL_SECS=2
    depends_on:
      - cortex-mq
    deploy:
      replicas: 3
    restart: on-failure

  cortex-monitor:
    build:
      context: ./cortex-monitor
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BROKER_URL=http://cortex-mq:50051
    depends_on:
      - cortex-mq
    restart: on-failure
